version: "3.8"

services:
  # ─── MongoDB Database ────────────────────────────────────────────────
  mongo:
    image: mongo:7
    container_name: notewise-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: notewise
      MONGO_INITDB_ROOT_PASSWORD: notewise123
    volumes:
      - mongo-data:/data/db
    networks:
      - notewise-net

  # ─── Backend API Server ──────────────────────────────────────────────
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: notewise-server
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      MONGO_URI: mongodb://notewise:notewise123@mongo:27017/notewise?authSource=admin
      # Set in shell or a .env file next to this compose file (never commit real values).
      GROQ_API_KEY: ${GROQ_API_KEY:?Set GROQ_API_KEY in environment or .env}
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in environment or .env}
    depends_on:
      - mongo
    networks:
      - notewise-net

  # ─── Frontend (React + Nginx) ───────────────────────────────────────
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: notewise-client
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - server
    networks:
      - notewise-net

volumes:
  mongo-data:
    driver: local

networks:
  notewise-net:
    driver: bridge
