apiVersion: apps/v1
kind: Deployment
metadata:
  name: notewise
spec:
  replicas: 2
  selector:
    matchLabels:
      app: notewise
  template:
    metadata:
      labels:
        app: notewise
    spec:
      containers:
        - name: notewise
          image: notewise:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5000
          env:
            - name: PORT
              value: "5000"
            - name: MONGO_URI
              value: mongodb://mongo:27017/notewise
          envFrom:
            - secretRef:
                name: notewise-secrets
          readinessProbe:
            httpGet:
              path: /
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /
              port: 5000
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: notewise
spec:
  type: NodePort
  selector:
    app: notewise
  ports:
    - name: http
      port: 5000
      targetPort: 5000
      nodePort: 30500
