apiVersion: apps/v1
kind: Deployment
metadata:
  name: client-deployment
  namespace: notewise
  labels:
    app: notewise
    tier: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: notewise
      tier: frontend
  template:
    metadata:
      labels:
        app: notewise
        tier: frontend
    spec:
      containers:
        - name: notewise-client
          image: notewise-client:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 80
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
---
apiVersion: v1
kind: Service
metadata:
  name: client-service
  namespace: notewise
  labels:
    app: notewise
    tier: frontend
spec:
  selector:
    app: notewise
    tier: frontend
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30080
  type: NodePort
